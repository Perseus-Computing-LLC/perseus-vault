name: Release binaries

# #432: GitHub Releases shipped no binary assets, so every install/upgrade
# required a full Rust source build (rustup + gcc + libssl-dev + g++ + a
# multi-minute cargo build). This workflow builds prebuilt binaries on tag
# push and uploads them as release assets, so the documented install/recovery
# path becomes a one-line `curl -L <asset> | tar xz`.
#
# Two flavors are shipped per platform:
#   * perseus-vault-lite — `--no-default-features`, statically linked (musl on
#     Linux). No bundled ONNX embeddings, NO openssl/system-lib runtime deps
#     (this is the same lean build the Dockerfile already produces). Smallest,
#     most portable; ideal for the "deploy a one-file fix" case in the issue.
#   * perseus-vault      — default features (bundled-embeddings). Zero-config
#     dense/hybrid semantic search out of the box; dynamically linked (glibc /
#     system libssl on Linux), so it targets the platform's stable runner.

on:
  push:
    tags:
      - "v*"
  # Allow validating the build on demand without cutting a tag.
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release.yml"

permissions:
  contents: write # upload assets onto the release for the pushed tag

jobs:
  # Create the GitHub Release object ONCE, up front (#483). On a tag push the
  # lite/full matrix legs each call taiki-e/upload-rust-binary-action, which
  # create-or-uploads to the release; run in parallel they race to CREATE it and
  # the losers fail their asset upload with "release not found" (bit v2.17.5 /
  # v2.18.0 / v2.18.1). With the release pre-created here, every leg only uploads
  # — no creation race. The step is a no-op on dispatch/PR (dry-run validation),
  # so lite/full (which `needs` this) still run and dry-build there.
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — reusing."
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --generate-notes --verify-tag
          fi

  # ── Lean, fully static binaries (no default features, no openssl) ──────────
  lite:
    name: lite ${{ matrix.target }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - name: Upload lite binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: perseus-vault
          # Distinguish the lean asset from the full one on the release page.
          archive: perseus-vault-lite-$target
          target: ${{ matrix.target }}
          no-default-features: true
          # cross handles the musl toolchain in a container; --no-default-features
          # drops ort/tokenizers and the openssl-sys download path entirely.
          tar: unix
          checksum: sha256
          # On a tag push this uploads to the release; on dispatch/PR it just
          # builds (dry-run) to validate the pipeline.
          dry-run: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Full binaries with bundled embeddings (default features) ───────────────
  full:
    name: full ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # A running leg that wedges gets killed rather than hanging the run (queue
    # time is not counted). The pre-created release (#483) means the other legs'
    # assets still land even if the scarce macos-13 leg is slow.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
          # macOS Intel (x86_64-apple-darwin) is intentionally NOT built here:
          # GitHub's free macos-13 Intel runners are being retired and routinely
          # sit queued for 45+ min, which stalled the whole release (and blocked
          # the attest job that needs every leg). Apple-Silicon Macs are covered
          # by aarch64-apple-darwin above; Intel Macs fall back to the lite
          # (musl is Linux-only, so on Intel mac: source build or Rosetta on the
          # arm64 binary). Revisit if/when a reliable Intel-mac runner returns.
          # Windows — bundled-embeddings links on MSVC (see Cargo.toml #222); no
          # openssl in the dep tree (ureq/rustls + bundled sqlite), so no system
          # libs are required.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      # bundled-embeddings pulls ort's download path which links openssl-sys on
      # Linux; provide the system dev libs the source build needs.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      # ── macOS: manual build + Developer ID signing (#732) ──────────────────
      # taiki-e's fused build+upload gives no hook to codesign the binary
      # before it lands on the release, and ad-hoc-signed binaries are rejected
      # by Claude Desktop's extension host on macOS. So macOS legs build with
      # plain cargo, sign/notarize when the Apple secrets are configured
      # (repo variable APPLE_SIGNING_ENABLED=true; see docs/macos-signing.md),
      # and upload the tarball with gh.
      - name: Build full binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Sign + notarize (macOS, when signing is configured)
        if: runner.os == 'macOS' && vars.APPLE_SIGNING_ENABLED == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: bash scripts/sign-macos.sh target/${{ matrix.target }}/release/perseus-vault
      - name: Note unsigned build (macOS, signing not configured)
        if: runner.os == 'macOS' && vars.APPLE_SIGNING_ENABLED != 'true'
        run: |
          echo "::warning::APPLE_SIGNING_ENABLED is not set — shipping an ad-hoc signed macOS binary (see #732 / docs/macos-signing.md)"
      - name: Package + upload (macOS, tag pushes)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "target/${{ matrix.target }}/release"
          asset="perseus-vault-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" perseus-vault
          shasum -a 256 "$asset" > "$asset.sha256"
          gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber
      - name: Upload full binary (Linux/Windows)
        if: runner.os != 'macOS'
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: perseus-vault
          archive: perseus-vault-$target
          target: ${{ matrix.target }}
          tar: unix
          checksum: sha256
          dry-run: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SLSA build provenance (signed attestations) ────────────────────────────
  # Once every binary is uploaded, generate a Sigstore-signed SLSA provenance
  # attestation for each release archive. Anyone can then verify that a
  # downloaded binary was built by THIS workflow from THIS repo:
  #
  #   gh attestation verify perseus-vault-lite-x86_64-unknown-linux-musl.tar.gz \
  #     --repo Perseus-Computing-LLC/perseus-vault
  #
  # Attestations are signed via the Sigstore public-good instance (OIDC, no key
  # management on our side) and stored in the repo's attestation store. The
  # build/upload here is fused inside taiki-e's action, so rather than reach into
  # its internals we re-download the just-published assets and attest them by
  # digest — decoupled and robust. Tag pushes only; nothing to attest on dry-runs.
  #
  # `!cancelled()` (rather than plain success) means a single flaky/failed build
  # leg cannot block provenance for every other binary: attest still runs and
  # signs whatever assets did upload. It errors only if the release has no
  # assets at all (a wholly-failed release, which should be red).
  attest:
    name: attest release provenance
    needs: [lite, full]
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read       # download the release assets
      id-token: write      # OIDC identity used to sign via Sigstore
      attestations: write  # write provenance to the attestation store
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.tar.gz' --pattern '*.zip' --dir artifacts
          ls -l artifacts
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/*'
