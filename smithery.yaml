# Smithery.ai configuration
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      dbPath:
        type: string
        description: Path to the SQLite database file
        default: ~/.mimir/data/perseus-vault.db
  commandFunction: |-
    (config) => ({
      command: 'perseus-vault',
      args: ['serve', '--db', config.dbPath || '~/.mimir/data/perseus-vault.db']
    })
  exampleConfig:
    dbPath: ~/.mimir/data/perseus-vault.db
